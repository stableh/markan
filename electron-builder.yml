appId: com.pdfan.app
productName: PDFan
copyright: Copyright © 2026 PDFan

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
